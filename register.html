<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register — Master Of ICT</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <div class="header-brand-row">
          <a class="logo" href="index.html">Master<span>Of ICT</span></a>
          <button
            type="button"
            class="nav-toggle"
            aria-expanded="false"
            aria-controls="header-collapsible"
            aria-label="Open menu"
          >
            ☰
          </button>
        </div>
        <div class="header-collapsible" id="header-collapsible">
          <nav aria-label="Main">
            <ul class="nav-links">
              <li><a href="index.html" data-nav>Home</a></li>
              <li><a href="courses.html" data-nav>Courses</a></li>
              <li><a href="dashboard.html" data-nav>My courses</a></li>
              <li><a href="admin.html" data-nav>Admin</a></li>
            </ul>
          </nav>
          <div class="nav-actions">
            <a class="btn btn-secondary btn-sm" href="login.html">Sign in</a>
          </div>
        </div>
      </div>
    </header>

    <main>
      <h1 class="page-title" style="text-align: center">Register</h1>
      <div class="form-panel">
        <p id="form-error" class="form-error" hidden></p>
        <form id="register-form" novalidate>
          <div class="form-group">
            <label for="email">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              required
            />
          </div>
          <div class="form-group">
            <label for="password">Password (at least 6 characters)</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="new-password"
              required
              minlength="6"
            />
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create account</button>
            <a class="btn btn-secondary" href="login.html">Sign in</a>
          </div>
        </form>
        <p class="demo-note">Account is stored only on this phone or computer.</p>
      </div>
    </main>

    <footer class="site-footer">Then open Courses and buy packs in LKR (demo).</footer>

    <script src="js/storage.js"></script>
    <script src="js/courses.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/nav.js"></script>
    <script>
      (function () {
        document.addEventListener("DOMContentLoaded", function () {
          var form = document.getElementById("register-form");
          var err = document.getElementById("form-error");
          form.addEventListener("submit", function (e) {
            e.preventDefault();
            err.hidden = true;
            var result = ICTAuth.register(
              document.getElementById("email").value,
              document.getElementById("password").value
            );
            if (!result.ok) {
              err.textContent = result.error;
              err.hidden = false;
              return;
            }
            location.href = "courses.html";
          });
        });
      })();
    </script>
  </body>
</html>
